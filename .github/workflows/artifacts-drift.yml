name: artifacts-drift

# Verifies that generated deployment artifacts are in sync with their sources.
#
#   sources                                          generated artifacts
#   ──────────────────────────────────────────       ─────────────────────────────
#   skills/**/*.md            ──translate_for_cursor──> .cursor/rules/*.mdc
#   .claude-plugin/{plugin,marketplace}.json
#                             ──generate_codex_artifacts──> .codex-plugin/plugin.json
#                                                           .agents/plugins/marketplace.json
#
# Failure means someone edited a source but forgot to commit regenerated
# artifacts. The pre-commit hooks regenerate them locally; this workflow
# catches PRs where pre-commit wasn't installed or run.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'skills/**/*.md'
      - '.claude-plugin/**'
      - '.cursor/rules/**'
      - '.codex-plugin/**'
      - '.agents/plugins/**'
      - 'scripts/translate_for_cursor.py'
      - 'scripts/generate_codex_artifacts.py'
      - '.github/workflows/artifacts-drift.yml'

permissions: {}

concurrency:
  group: artifacts-drift-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-drift:
    name: generated artifacts in sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version: "0.6.14"
          enable-cache: false

      - name: Check generated artifacts in sync
        run: |
          set -euo pipefail

          failures=0

          echo "→ Checking Cursor .mdc rules..."
          if ! uv run scripts/translate_for_cursor.py --check; then
            echo "::error::Cursor .mdc rules are stale. Run locally: uv run scripts/translate_for_cursor.py"
            failures=$((failures + 1))
          fi

          echo
          echo "→ Checking Codex plugin artifacts..."
          if ! uv run scripts/generate_codex_artifacts.py --check; then
            echo "::error::Codex/agents artifacts are stale. Run locally: uv run scripts/generate_codex_artifacts.py"
            failures=$((failures + 1))
          fi

          if (( failures > 0 )); then
            echo
            echo "Found $failures drift(s). Regenerate artifacts locally and commit them."
            echo "Alternative: install pre-commit so this happens automatically:"
            echo "  pip install pre-commit && pre-commit install"
            exit 1
          fi
