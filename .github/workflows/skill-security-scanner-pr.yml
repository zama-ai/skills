name: skill-security-scanner-pr

# Scans Claude skills in this repository on every pull request targeting main.
# Fails the PR if high-severity findings are detected.
#
# Deploy this workflow by copying it to .github/workflows/ in the marketplace/skill repo.
#
# Scan modes:
#   simple   — static + behavioral analyzers only; no API keys required; fast.
#   advanced — superset of simple, adds LLM analysis and VirusTotal file scanning;
#              requires CLAUDE_CODE_OAUTH_TOKEN and VIRUSTOTAL_API_KEY secrets.
#
# Security model:
#   - Scans the checked-out PR contents; no external repo cloning needed
#   - Minimal permissions: contents:read only
#
# Secrets:
#   - CLAUDE_CODE_OAUTH_TOKEN (required for advanced mode): Anthropic API key, passed as
#     SKILL_SCANNER_LLM_API_KEY to the scanner for LLM-based analysis.
#   - VIRUSTOTAL_API_KEY (required for advanced mode): VirusTotal API key for binary file scanning.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'skills/**'
  workflow_dispatch:
    inputs:
      scan_mode:
        description: >
          simple — static/behavioral only (fast, no API keys),
          advanced — adds LLM + VirusTotal (slow, over 11 mins).
        type: choice
        options:
          - advanced
          - simple
        required: false
        default: 'advanced'
      llm_model:
        description: >
          LiteLLM model string (advanced mode only).
          anthropic/claude-haiku-4-5-20251001 (default, highest rate limits),
          anthropic/claude-opus-4-6 (best quality, lowest rate limits).
        required: false
        default: 'anthropic/claude-haiku-4-5-20251001'

permissions: {}

concurrency:
  group: skill-security-scanner-pr-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true  # Cancel superseded runs when a new commit is pushed to the PR

jobs:
  scan-skills:
    name: scan-skills-${{ inputs.scan_mode || 'advanced' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read # Checkout repository
    env:
      SKILL_SCANNER_LLM_MODEL: ${{ inputs.llm_model || 'anthropic/claude-haiku-4-5-20251001' }}

    steps:

      # ── Phase 1: Setup ────────────────────────────────────────────────

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version: "0.6.14"
          enable-cache: false

      - name: Install skill-scanner
        run: |
          set -euo pipefail
          uv venv /tmp/skill-scanner-env
          uv pip install --python /tmp/skill-scanner-env cisco-ai-skill-scanner==2.0.9
          echo "/tmp/skill-scanner-env/bin" >> "$GITHUB_PATH"

      # ── Phase 2: Scan ─────────────────────────────────────────────────

      - name: Run skill-scanner
        id: scan
        run: |
          set -euo pipefail
          mkdir -p /tmp/scan-results

          # Build extra flags based on scan mode
          EXTRA_FLAGS=""
          if [ "$SCAN_MODE" = "advanced" ]; then
            EXTRA_FLAGS="--use-llm --use-virustotal"
            echo "Scanning repository skills in $GITHUB_WORKSPACE (advanced: LLM + VirusTotal) ..."
          else
            echo "Scanning repository skills in $GITHUB_WORKSPACE (simple: static + behavioral) ..."
          fi

          set +e

          # JSON output — the tool's native format; includes proper skill paths per finding.
          # SARIF is not used because the scanner's SARIF output does not embed per-skill base
          # paths (all findings share a single unresolved %SRCROOT% symbol), making it
          # impossible to correctly resolve file URIs across a multi-skill scan.
          # shellcheck disable=SC2086
          skill-scanner scan-all "$GITHUB_WORKSPACE" \
            --recursive \
            --use-behavioral \
            $EXTRA_FLAGS \
            --policy balanced \
            --format json \
            > /tmp/scan-results/results.json \
            2> /tmp/scan-results/scan.log
          SCAN_EXIT=$?

          set -e

          echo "scan_exit=$SCAN_EXIT" >> "$GITHUB_OUTPUT"

          RESULTS_CONTENT=$(tr -d '[:space:]' < /tmp/scan-results/results.json 2>/dev/null || true)
          if [ "$SCAN_EXIT" -eq 0 ]; then
            echo "scan_status=clean"    >> "$GITHUB_OUTPUT"
          elif [ -z "$RESULTS_CONTENT" ]; then
            # Non-zero exit with no JSON output — could be "no skills found" (legitimate) or a
            # real crash. Distinguish by checking scan.log: the scanner prints a known message
            # to stderr when it finds no skill packages and returns 1.
            if grep -qF "No skills found to scan." /tmp/scan-results/scan.log 2>/dev/null; then
              echo "scan_status=clean"  >> "$GITHUB_OUTPUT"
            else
              # No known "no skills" message — treat as scanner error and fail closed.
              echo "scan_status=error"  >> "$GITHUB_OUTPUT"
            fi
          else
            echo "scan_status=findings" >> "$GITHUB_OUTPUT"
          fi
        env:
          SCAN_MODE: ${{ inputs.scan_mode || 'advanced' }}
          # Gate secrets on advanced mode: only pass them when scan mode is not explicitly 'simple'.
          SKILL_SCANNER_LLM_API_KEY: ${{ inputs.scan_mode != 'simple' && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          VIRUSTOTAL_API_KEY: ${{ inputs.scan_mode != 'simple' && secrets.VIRUSTOTAL_API_KEY || '' }}

      # ── Phase 3: Results ──────────────────────────────────────────────
      # Annotation runs first so that results.json contains GitHub URLs when the
      # summary script reads it — skill and file paths become directly usable as hrefs.

      - name: Annotate results with repo URL
        if: always()
        run: |
          if [ -f /tmp/scan-results/results.json ]; then
            sed -i "s|${GITHUB_WORKSPACE}|${REPO_URL}/tree/${SCANNED_SHA}|g" /tmp/scan-results/results.json
          fi
        env:
          REPO_URL: https://github.com/${{ github.repository }}
          SCANNED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Publish step summary
        if: always()
        env:
          REPO_URL: https://github.com/${{ github.repository }}
          SCAN_MODE: ${{ inputs.scan_mode || 'advanced' }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          SCANNED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: python3 scripts/skill_scan_summary.py

      - name: Upload scan artifact
        if: always()
        #   gh api repos/actions/upload-artifact/git/refs/tags/v7 --jq '.object.sha'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: skill-scan-${{ inputs.scan_mode || 'advanced' }}-results-${{ github.run_id }}
          path: /tmp/scan-results/
          retention-days: 30

      - name: Fail on Critical and High severity findings or scanner error
        if: steps.scan.outputs.scan_status == 'findings' || steps.scan.outputs.scan_status == 'error'
        run: |
          if [ "${{ steps.scan.outputs.scan_status }}" = "error" ]; then
            echo "::error::Skill scanner (${{ inputs.scan_mode || 'advanced' }}) crashed or produced no output (exit ${{ steps.scan.outputs.scan_exit }}). Failing closed."
          else
            echo "::error::Skill scanner (${{ inputs.scan_mode || 'advanced' }}) found high-severity issues. Review the job summary and the uploaded JSON artifact."
          fi
          exit 1
