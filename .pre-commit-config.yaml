# Pre-commit hooks for the zama-skills repo.
#
# Regenerates derived deployment artifacts whenever the source-of-truth files change:
#   .claude-plugin/{plugin,marketplace}.json  →  .codex-plugin/, .agents/plugins/
#   skills/<name>/SKILL.md and references/    →  .cursor/rules/*.mdc
#
# Install once:    pip install pre-commit && pre-commit install
# Run manually:    pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: generate-codex-artifacts
        name: Generate Codex plugin + marketplace
        entry: scripts/generate_codex_artifacts.py
        language: script
        pass_filenames: false
        files: ^(\.claude-plugin/.*\.json|skills/.*/SKILL\.md)$

      - id: generate-cursor-rules
        name: Generate Cursor .mdc rules
        entry: scripts/translate_for_cursor.py
        language: script
        pass_filenames: false
        files: ^skills/.*\.md$
